<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penilaian Kinerja</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

/* BODY */
body{
  display:flex;
  background:#0f3f2f;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  min-height:100vh;
  background:#0b2f24;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* BRAND */
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:25px;
}

.brand img{
  width:75px;
  height:75px;
}

.brand h3{
  font-size:22px;
  font-weight:700;
}

/* MENU */
.menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  margin:8px 0;
  color:#cfe9df;
  text-decoration:none;
  border-radius:10px;
  transition:0.2s;
}

.menu a:hover{
  background:rgba(255,255,255,0.08);
}

.menu a.active{
  background:#1f8a62;
  color:white;
}

/* LOGOUT */
.logout{
  color:#ff6b6b !important;
}

/* DEV BOX */
.dev{
  background:#132d24;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.dev p{
  font-size:13px;
  color:#aaa;
}

.dev h4{
  font-size:16px;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* CARD */
.card{
  background:#1f6b50;
  padding:25px;
  border-radius:12px;
  margin-bottom:20px;
}

/* LIST */
ul{
  list-style:none;
}

li{
  background:#285f4b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

li b{
  color:#00ffcc;
}

/* INPUT */
input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button{
  background:#00c48c;
  border:none;
  padding:8px 15px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* HASIL */
#hasil{
  margin-top:10px;
  color:#00ffcc;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div>
    <div class="brand">
      <img src="../assets/images/dishut.jpeg">
      <h3>SI-TEKAD HUTAN</h3>
    </div>

    <div class="menu">
      <a href="dashboard.html">
        <i class="fa-solid fa-home"></i> Dashboard
      </a>

      <a href="laporan.html">
        <i class="fa-solid fa-file-alt"></i> Laporan
      </a>

      <a href="penilaian.html" class="active">
        <i class="fa-solid fa-star"></i> Penilaian
      </a>

      <a class="logout" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Keluar
      </a>
    </div>
  </div>

  <div class="dev">
    <i class="fa-solid fa-code"></i>
    <p>DEVELOPED BY</p>
    <h4>Rahmanda Al Riski</h4>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h3>Penilaian Kinerja</h3>
    <ul id="listPenilaian"></ul>
    <h4 id="rataNilai"></h4>
  </div>

  <div class="card">
    <h3>Penilaian Otomatis</h3>

    <label>Nilai Laporan</label>
    <select id="laporan">
      <option value="5">AA</option>
      <option value="4">A</option>
      <option value="3">BB</option>
      <option value="2">B</option>
      <option value="1">C</option>
    </select>

    <label>Hari Tindak Lanjut</label>
    <input type="number" id="hari">

    <button onclick="hitung()">Hitung</button>

    <h3 id="hasil"></h3>
  </div>

</div>

<script>
// LOAD DATA
function tampilkanPenilaian(){
  let list = document.getElementById("listPenilaian");
  list.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("laporan")) || [];

  data.forEach((item, index)=>{
    let li = document.createElement("li");
    li.innerHTML = `
      <b>${item.unit}</b><br>
      ${item.laporan}<br>
      ${item.tanggal}<br>

      <input type="number" id="nilai${index}" value="${item.nilai || ""}">
      <button onclick="simpanNilai(${index})">Simpan</button>
    `;
    list.appendChild(li);
  });
}

function simpanNilai(index){
  let data = JSON.parse(localStorage.getItem("laporan")) || [];
  let nilai = document.getElementById("nilai"+index).value;

  data[index].nilai = nilai;
  localStorage.setItem("laporan", JSON.stringify(data));
  tampilkanPenilaian();
}

function hitung(){
  let laporan = parseInt(document.getElementById("laporan").value);
  let hari = parseInt(document.getElementById("hari").value);

  let nilaiHari = hari < 15 ? 5 :
                  hari <= 30 ? 4 :
                  hari <= 45 ? 3 :
                  hari <= 60 ? 2 : 1;

  document.getElementById("hasil").innerText =
    "Nilai: " + (laporan + nilaiHari);
}

function logout(){
  localStorage.removeItem("isLogin");
  window.location.href = "login.html";
}

tampilkanPenilaian();
</script>

</body>
</html>
