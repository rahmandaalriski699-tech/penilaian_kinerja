<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data User - SI-TEKAD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  display:flex;
  background: radial-gradient(circle at top, #145c44, #0b2f24 60%);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  min-height:100vh;
  background:rgba(11,47,36,0.85);
  backdrop-filter: blur(12px);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:25px;
}

.brand img{
  width:65px;
  height:65px;
  border-radius:10px;
}

.menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin:8px 0;
  color:#cfe9df;
  text-decoration:none;
  border-radius:10px;
}

.menu a:hover{
  background:rgba(255,255,255,0.08);
}

.menu a.active{
  background:#1f8a62;
}

.logout{
  color:#ff6b6b !important;
}

/* DEVELOPED BY */
.dev{
  background:#132d24;
  padding:14px;
  border-radius:12px;
  text-align:center;
  margin-top:20px;
}

.dev i{font-size:20px;}
.dev p{font-size:13px;color:#aaa;}
.dev h4{font-size:15px;}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

.header{
  background:rgba(31,107,80,0.5);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* TABLE */
.table-box{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:#0b3d2e;
  color:white;
  padding:12px;
}

td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid #eee;
}
</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div>
    <div class="brand">
      <img src="../assets/images/dishut.jpeg">
      <h3>SI-TEKAD ADMIN</h3>
    </div>

<div class="menu">
  <a href="admin_dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
  <a class="active"><i class="fa fa-users"></i> User</a>
  <a href="rangking.html"><i class="fa fa-trophy"></i> Ranking</a>
  <a class="logout" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</a>
</div>

  </div>

  <!-- DEVELOPED BY -->

  <div class="dev">
    <i class="fa-solid fa-code"></i>
    <p>DEVELOPED BY</p>
    <h4>Rahmanda Al Riski</h4>
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <div class="header">
    <h2>👥 Data User</h2>
    <p>Manajemen pengguna SI-TEKAD</p>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nama</th>
          <th>Email</th>
          <th>Role</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<script>
async function loadUser(){
  let res = await fetch("../backend/get_user.php");
  let data = await res.json();

  let tbody = document.getElementById("userTable");
  tbody.innerHTML = "";

  data.forEach(user => {

    let roleBadge = user.role === "admin"
      ? '<span style="background:#e74c3c;color:white;padding:5px 10px;border-radius:20px;">Admin</span>'
      : '<span style="background:#1f8a62;color:white;padding:5px 10px;border-radius:20px;">User</span>';

    tbody.innerHTML += `
      <tr>
        <td>${user.id}</td>
        <td>${user.nama}</td>
        <td>${user.email}</td>
        <td>${roleBadge}</td>
      </tr>
    `;
  });
}

function logout(){
  location.href="login.html";
}

loadUser();
</script>

</body>
</html>
