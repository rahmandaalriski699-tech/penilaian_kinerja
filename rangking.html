<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Ranking Unit - SI-TEKAD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  display:flex;
  background: linear-gradient(135deg, #0b2f24, #145c44);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  min-height:100vh;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(15px);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border-right:1px solid rgba(255,255,255,0.1);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:25px;
}

.brand img{
  width:60px;
  border-radius:12px;
}

.menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  margin:8px 0;
  color:#cfe9df;
  text-decoration:none;
  border-radius:10px;
  transition:0.3s;
}

.menu a:hover{
  background:rgba(255,255,255,0.1);
  transform:translateX(5px);
}

.menu a.active{
  background:linear-gradient(135deg,#1f8a62,#27ae60);
  box-shadow:0 0 10px rgba(46,204,113,0.5);
}

.logout{
  color:#ff6b6b !important;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* HEADER */
.header{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-bottom:25px;
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

/* PODIUM */
.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:20px;
  margin-bottom:30px;
}

.podium-item{
  text-align:center;
  width:140px;
  border-radius:20px;
  padding:15px;
  transition:0.3s;
  position:relative;
}

.podium-item::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  z-index:-1;
}

.podium-item:hover{
  transform:translateY(-10px) scale(1.05);
}

/* FIRST */
.first{
  height:200px;
  background:linear-gradient(135deg,#ffd700,#f1c40f);
  color:black;
  box-shadow:0 0 25px rgba(255,215,0,0.8);
}

/* SECOND */
.second{
  height:150px;
  background:linear-gradient(135deg,#bdc3c7,#95a5a6);
  box-shadow:0 0 15px rgba(189,195,199,0.6);
}

/* THIRD */
.third{
  height:130px;
  background:linear-gradient(135deg,#cd7f32,#a0522d);
  box-shadow:0 0 15px rgba(205,127,50,0.6);
}

.rank{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

/* TABLE */
.table-box{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

table{
  width:100%;
  border-collapse:collapse;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:linear-gradient(135deg,#0b3d2e,#145c44);
  color:white;
  padding:14px;
  font-weight:600;
}

td{
  padding:14px;
  text-align:center;
  background:white;
  color:black;
}

tr{
  transition:0.2s;
}

tr:hover{
  background:#ecf9f4;
  transform:scale(1.01);
}

/* BADGE */
.badge{
  padding:6px 12px;
  border-radius:20px;
  color:white;
  font-size:12px;
  font-weight:bold;
}

.baik{
  background:linear-gradient(135deg,#27ae60,#2ecc71);
}

.cukup{
  background:linear-gradient(135deg,#f39c12,#f1c40f);
}

.kurang{
  background:linear-gradient(135deg,#e74c3c,#c0392b);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div>
    <div class="brand">
      <img src="../assets/images/dishut.jpeg">
      <h3>SI-TEKAD ADMIN</h3>
    </div>

    <div class="menu">
      <a href="admin_dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
      <a href="user.html"><i class="fa fa-users"></i> User</a>
      <a class="active"><i class="fa fa-trophy"></i> Ranking</a>
      <a class="logout" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</a>
    </div>
  </div>

  <div style="background:#132d24;padding:14px;border-radius:12px;text-align:center;">
    <i class="fa-solid fa-code"></i>
    <p style="font-size:13px;color:#aaa;">DEVELOPED BY</p>
    <h4 style="font-size:15px;">Rahmanda Al Riski</h4>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>🏆 Ranking Unit</h2>
    <p>Perankingan berdasarkan nilai laporan tertinggi</p>
  </div>

  <!-- PODIUM -->
  <div class="podium">
    <div class="podium-item second">
      <div class="rank">🥈 2</div>
      <h4 id="rank2_unit">-</h4>
      <p id="rank2_nilai">0</p>
    </div>

    <div class="podium-item first">
      <div class="rank">👑 1</div>
      <h3 id="rank1_unit">-</h3>
      <p id="rank1_nilai">0</p>
    </div>

    <div class="podium-item third">
      <div class="rank">🥉 3</div>
      <h4 id="rank3_unit">-</h4>
      <p id="rank3_nilai">0</p>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Unit</th>
          <th>Nilai</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="rankingData"></tbody>
    </table>
  </div>

</div>

<script>
// LOAD DATA
async function loadRanking(){
  try{
    let res = await fetch("../backend/get_ranking.php");
    let data = await res.json();

    let tbody = document.getElementById("rankingData");
    tbody.innerHTML = "";

    // PODIUM
    if(data.length > 0){
      document.getElementById("rank1_unit").innerText = data[0]?.unit || "-";
      document.getElementById("rank1_nilai").innerText = data[0]?.rata_nilai || "0";

      document.getElementById("rank2_unit").innerText = data[1]?.unit || "-";
      document.getElementById("rank2_nilai").innerText = data[1]?.rata_nilai || "0";

      document.getElementById("rank3_unit").innerText = data[2]?.unit || "-";
      document.getElementById("rank3_nilai").innerText = data[2]?.rata_nilai || "0";
    }

    // TABLE
    data.forEach((item, index) => {

      let badgeClass = item.status === "Sangat Baik" ? "baik" :
                       item.status === "Cukup" ? "cukup" : "kurang";

      let medal = index == 0 ? "🥇" :
                  index == 1 ? "🥈" :
                  index == 2 ? "🥉" : "";

      tbody.innerHTML += `
        <tr>
          <td>${medal} #${index+1}</td>
          <td>${item.unit}</td>
          <td>${item.rata_nilai}</td>
          <td><span class="badge ${badgeClass}">${item.status}</span></td>
        </tr>
      `;
    });

    animatePodium();

  }catch(e){
    console.error("Gagal load ranking:", e);
  }
}

// ANIMASI PODIUM
function animatePodium(){
  document.querySelectorAll(".podium-item").forEach((el,i)=>{
    el.style.opacity = 0;
    el.style.transform = "translateY(30px)";
    
    setTimeout(()=>{
      el.style.transition = "0.5s";
      el.style.opacity = 1;
      el.style.transform = "translateY(0)";
    }, i*200);
  });
}

// LOGOUT
function logout(){
  location.href="login.html";
}

// INIT
loadRanking();
</script>

</body>
</html>
