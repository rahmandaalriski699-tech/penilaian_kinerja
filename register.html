<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Registrasi - SI-TEKAD HUTAN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/register.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="header">
    <i class="fa-solid fa-leaf"></i>
    <h2>Registrasi SI-TEKAD</h2>
    <p>Buat akun untuk akses SI-TEKAD</p>
  </div>

  <form id="registerForm">

    <div class="input-box">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="nama" placeholder="Nama Lengkap" required>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-shield-halved"></i>
      <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" required>
    </div>

    <button type="submit">
      <i class="fa-solid fa-user-plus"></i> Daftar
    </button>

  </form>

  <p class="login-text">
    Sudah punya akun? <a href="login.html">Login</a>
  </p>

</div>

<script src="js/register.js"></script>

</body>
</html>
