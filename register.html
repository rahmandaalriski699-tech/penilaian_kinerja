<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Registrasi - E-Kinerja Dishut</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    /* BACKGROUND HIJAU KEHUTANAN */
    body {
      background: linear-gradient(135deg, #0b3d2e, #145c44);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #f5f5f5;
      padding: 30px;
      width: 380px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card h2 {
      margin-bottom: 10px;
      font-size: 22px;
      color: #0b3d2e;
    }

    .card p {
      margin-bottom: 20px;
      color: #555;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #0b3d2e;
      box-shadow: 0 0 5px rgba(11,61,46,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0b3d2e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #145c44;
    }

    .login-text {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }

    .login-text a {
      color: #0b3d2e;
      text-decoration: none;
      font-weight: bold;
    }

    .login-text a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2><i class="fa-solid fa-user-plus"></i> Registrasi E-Kinerja</h2>
    <p>Buat akun untuk mengakses sistem E-Kinerja</p>

    <form id="registerForm">
      <div class="form-group">
        <input type="text" id="nama" placeholder="Nama Lengkap" required>
      </div>

      <div class="form-group">
        <input type="email" id="email" placeholder="Email" required>
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <div class="form-group">
        <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" required>
      </div>

      <button type="submit">Daftar</button>
    </form>

    <p class="login-text">
      Sudah punya akun? <a href="login.html">Login</a>
    </p>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
      e.preventDefault();

      let nama = document.getElementById("nama").value;
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;
      let confirmPassword = document.getElementById("confirmPassword").value;

      if(password !== confirmPassword) {
        alert("Password tidak cocok!");
        return;
      }

      // Simpan sementara (frontend)
      localStorage.setItem("nama", nama);
      localStorage.setItem("email", email);
      localStorage.setItem("password", password);

      alert("Registrasi berhasil!");

      // redirect ke login
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
