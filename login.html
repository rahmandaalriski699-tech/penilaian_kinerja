<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login E-Kinerja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">

  <!-- ICON -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- NOTIF STYLE (TETAP DIPERTAHANKAN) -->
  <style>
    .notif {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
      text-align: center;
      transition: 0.3s;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    .warning {
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <!-- HEADER BARU (SEPERTI REGISTER) -->
  <div class="header">
    <i class="fa-solid fa-leaf"></i>
    <h2>Login SI-TEKAD</h2>
    <p>Masuk ke Sistem SI-TEKAD Dishut</p>
  </div>

  <!-- FORM LOGIN (ID TIDAK DIUBAH = AMAN) -->
  <form id="loginForm">

    <div class="input-box">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-box password-box">
      <i class="fa-solid fa-lock"></i>
      
      <input type="password" id="password" placeholder="Password" required>
      
      <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i></div>

    <button type="submit">
      <i class="fa-solid fa-right-to-bracket"></i> Login
    </button>

  </form>

  <!-- NOTIFIKASI (TETAP ADA) -->
  <div id="notif" class="notif"></div>

  <!-- LINK REGISTER -->
  <p class="login-text">
    Belum punya akun? <a href="register.html">Daftar</a>
  </p>

</div>

<!-- JS TIDAK DIUBAH -->
<script src="js/login.js"></script>

</body>
</html>
