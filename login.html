<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login - E-Kinerja Dishut</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b3d2e, #145c44);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #f5f5f5;
      padding: 30px;
      width: 380px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card h2 {
      margin-bottom: 10px;
      font-size: 22px;
      color: #0b3d2e;
    }

    .card p {
      margin-bottom: 20px;
      color: #555;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #0b3d2e;
      box-shadow: 0 0 5px rgba(11, 61, 46, 0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0b3d2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #145c44;
    }

    .register-text {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }

    .register-text a {
      color: #0b3d2e;
      text-decoration: none;
      font-weight: bold;
    }

    .register-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>
      <i class="fa-solid fa-right-to-bracket"></i>
      Login E-Kinerja
    </h2>

    <p>Masuk ke sistem E-Kinerja</p>

    <div class="form-group">
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="form-group">
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <button onclick="login()">Login</button>

    <p class="register-text">
      Belum punya akun?
      <a href="register.html">Daftar</a>
    </p>
  </div>

  <script>
    // Set akun default (reset setiap refresh)
    localStorage.setItem("email", "admin@gmail.com");
    localStorage.setItem("password", "123");

    function login() {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      const savedEmail = (localStorage.getItem("email") || "").toLowerCase();
      const savedPassword = localStorage.getItem("password");

      // Validasi input kosong
      if (!email || !password) {
        alert("Email dan password wajib diisi!");
        return;
      }

      // Proses login
      if (email === savedEmail && password === savedPassword) {
        localStorage.setItem("isLogin", "true");
        alert("Login berhasil!");
        window.location.href = "dashboard.html";
      } else {
        alert("Email atau password salah!");
      }
    }
  </script>
</body>
</html>
